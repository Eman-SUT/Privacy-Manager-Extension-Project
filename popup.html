<!DOCTYPE html>
<html>
<head>
  <title>Privacy Manager</title>
  <style>
    body {
        font-family: 'Roboto', 'Segoe UI', Tahoma, sans-serif;
        width: 350px;
        padding: 16px;
        background-color: #ffffff; 
        color: #202124; 
    }

    h2 { 
        color: #1a73e8; 
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    button {
        background-color: #1a73e8; 
        color: white;
        border: 1px solid transparent;
        padding: 10px 24px;
        margin-top: 12px;
        width: 100%;
        border-radius: 100px; 
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: background-color 0.2s, box-shadow 0.2s;
        box-shadow: none;
    }

    button:hover {
        background-color: #185abc;
        box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
    }

    #content, #cookieList {
        background: #f8f9fa; 
        margin-top: 12px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #dadce0; 
    }

    h4 { 
        color: #3c4043; 
        font-size: 14px; 
        margin-top: 0; 
        margin-bottom: 8px; 
    }

    ul { 
        padding-left: 20px; 
        margin: 0; 
    }

    li { 
        color: #5f6368; 
        font-size: 13px; 
        margin-bottom: 4px; 
    }

    p {
        font-size: 13px;
        color: #70757a;
        margin: 0;
    }

    .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
    .tab-link { 
        background: #f1f3f4; color: #5f6368; border-radius: 8px; padding: 8px; 
        font-size: 12px; border: none; cursor: pointer;
    }
    .tab-link.active { background: #1a73e8; color: white; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    hr { border: 0; border-top: 1px solid #dadce0; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>Privacy Manager</h2>

  <div class="tabs">
    <button class="tab-link active" data-tab="trackersTab">Trackers</button>
    <button class="tab-link" data-tab="cookiesTab">Cookies</button>
    <button class="tab-link" data-tab="privacyTab">Privacy</button>
    <button class="tab-link" data-tab="rightsTab">Rights</button>
  </div>

  <hr>

  <div id="trackersTab" class="tab-content active">
    <div id="content"><p>Scan to detect trackers.</p></div>
    <button id="scanBtn">Scan Trackers</button>
  </div>

  <div id="cookiesTab" class="tab-content">
    <div id="cookieList"><p>Manage site cookies.</p></div>
    <button id="cookieBtn">Show Cookies</button>
    <button id="clearCookiesBtn" style="background-color: #1a73e8;">Clear All Cookies</button>
  </div>

  <div id="privacyTab" class="tab-content">
    <p>Privacy Policy Analysis (NLP) coming soon...</p>
    <button id="analyzeBtn">Analyze Policy</button>
  </div>
  <div id="rightsTab" class="tab-content">
        <h4>Data Subject Rights (GDPR)</h4>
        <p style="font-size: 12px;">Select a request template:</p>
        <select id="templateSelect" style="width: 100%; margin-bottom: 10px; padding: 5px;">
            <option value="access">Subject Access Request (SAR)</option>
            <option value="delete">Right to Erasure (Deletion)</option>
        </select>
        <textarea id="templateArea" style="width: 100%; height: 120px; font-size: 11px; padding: 5px; border-radius: 5px;" readonly></textarea>
        <button id="copyTemplateBtn" style="margin-top: 10px; background-color: #1a73e8; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%;">Copy Template</button>
    </div>

  <script src="popup.js"></script>
</body>
</html>
