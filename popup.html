<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Privacy Guard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h3>Privacy Guard</h3>
  
  <div class="tab">
    <button id="btnTrackers" class="active-btn">Trackers</button>
    <button id="btnCookies">Cookies</button>
  </div>
  <div class="tab">
    <button id="btnPrivacy">NLP Analysis</button>
    <button id="btnGdpr">GDPR SAR</button>
  </div>

  <div id="trackers" class="section active">
    <div class="switch-container">
      <span class="switch-label">Enable Blocking</span>
      <label class="switch">
        <input type="checkbox" id="blockingToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div id="trackerList">Safe browsing. No trackers yet!</div>
  </div>

  <div id="cookies" class="section">
    <div id="cookieList" class="scroll-container"></div>
    <button id="clearCookies" class="btn-outline-danger">Clear All Cookies</button>
  </div>

  <div id="privacy" class="section">
    <p class="instruction-text">Analyze current page Privacy Policy:</p>
    <button id="analyzePolicy" class="btn-outline-primary">Extract & Analyze Terms</button>
    <div id="nlpResult">--</div>
  </div>

  <div id="gdpr" class="section">
    <div id="gdprOptions">
      <p class="placeholder-text">Select a GDPR request type to copy template.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
